services:
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10

  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_CHAT_MODEL: ${OLLAMA_CHAT_MODEL:-}
    # Only the embedding model is pulled by default (274 MB). Local chat
    # models are opt-in — set OLLAMA_CHAT_MODEL in .env (e.g. `llama3.2:1b`)
    # to pre-pull one, or leave empty and use Gemini for chat.
    entrypoint:
      - /bin/sh
      - -c
      - 'ollama pull nomic-embed-text && { [ -z "$$OLLAMA_CHAT_MODEL" ] || ollama pull "$$OLLAMA_CHAT_MODEL"; }'

  backend:
    build:
      context: .
    depends_on:
      ollama-init:
        condition: service_completed_successfully
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_EMBED_MODEL: nomic-embed-text
      DB_PATH: /data/notes.db
      MAX_TOOL_HOPS: "5"
      HISTORY_TURNS: "20"
      SEARCH_THRESHOLD: "0.35"
      SEARCH_FALLBACK_LIMIT: "3"
      OLLAMA_MODEL: ${OLLAMA_CHAT_MODEL:-llama3.2}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    volumes:
      - notes:/data
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./app
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  ollama:
  notes:
